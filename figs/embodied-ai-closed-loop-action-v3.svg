<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <marker id="loopArrow" markerWidth="12" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <style>text { font-family: Aptos, "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif; }</style>

    <rect width="1800" height="1200" fill="#ffffff"/>
    <rect x="0" y="0" width="1800" height="150" fill="#f7f9fc"/>
    <text x="82" y="76" font-size="42" font-weight="800" fill="#172033">Embodied AI for Verifiable Closed-Loop Action</text>
    <text x="82" y="116" font-size="22" fill="#5f6b7a">A research agenda: spatial memory, planning, action, world prediction, and failure feedback form a recoverable and evaluable embodied agent loop.</text>
    <text x="1718" y="82" font-size="24" font-weight="700" fill="#172033" text-anchor="end">707 papers  |  6 directions  |  29 subdirections</text>
  <text x="82" y="188" font-size="14" font-weight="850" fill="#5f6b7a">Closed-loop action thesis</text><path d="M396 346 C500 254 548 255 640 276" fill="none" stroke="#4E79A7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#loopArrow)"/><g>
    <rect x="422" y="237" width="188" height="28" rx="14" fill="#ffffff" stroke="#4E79A755"/>
    <text x="516" y="256" font-size="11.5" font-weight="780" fill="#4E79A7" text-anchor="middle">memory to plannable state</text>
  </g><path d="M1000 276 C1142 218 1245 236 1368 346" fill="none" stroke="#B07AA1" stroke-width="2.2" stroke-linecap="round" marker-end="url(#loopArrow)"/><g>
    <rect x="1080" y="228" width="188" height="28" rx="14" fill="#ffffff" stroke="#B07AA155"/>
    <text x="1174" y="247" font-size="11.5" font-weight="780" fill="#B07AA1" text-anchor="middle">task plan to executable action</text>
  </g><path d="M1536 422 C1608 510 1567 612 1470 650" fill="none" stroke="#E15759" stroke-width="2.2" stroke-linecap="round" marker-end="url(#loopArrow)"/><g>
    <rect x="1502" y="517" width="188" height="28" rx="14" fill="#ffffff" stroke="#E1575955"/>
    <text x="1596" y="536" font-size="11.5" font-weight="780" fill="#E15759" text-anchor="middle">action candidates to rollout</text>
  </g><path d="M1210 732 C1006 910 758 910 620 748" fill="none" stroke="#59A14F" stroke-width="2.2" stroke-linecap="round" marker-end="url(#loopArrow)"/><g>
    <rect x="821" y="884" width="188" height="28" rx="14" fill="#ffffff" stroke="#59A14F55"/>
    <text x="915" y="903" font-size="11.5" font-weight="780" fill="#59A14F" text-anchor="middle">predicted failure to feedback</text>
  </g><path d="M330 675 C188 558 168 464 258 422" fill="none" stroke="#76B7B2" stroke-width="2.2" stroke-linecap="round" marker-end="url(#loopArrow)"/><g>
    <rect x="96" y="534" width="188" height="28" rx="14" fill="#ffffff" stroke="#76B7B255"/>
    <text x="190" y="553" font-size="11.5" font-weight="780" fill="#76B7B2" text-anchor="middle">feedback updates memory and planning</text>
  </g><g>
    <rect x="96" y="290" width="300" height="132" rx="12" fill="#ffffff" stroke="#4E79A7" stroke-width="1.7"/>
    <rect x="96" y="290" width="300" height="7" rx="3.5" fill="#4E79A7"/>
    <text x="114" y="326" font-size="13" font-weight="850" fill="#4E79A7">VLN</text>
    <text class="" x="114" y="358" font-size="20" font-weight="850" fill="#172033" text-anchor="start"><tspan x="114" dy="0">Spatial Memory</tspan></text>
    <text class="" x="114" y="390" font-size="13.2" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="114" dy="0">map memory / 3D state / open world</tspan></text>
  </g><g>
    <rect x="640" y="208" width="360" height="132" rx="12" fill="#ffffff" stroke="#B07AA1" stroke-width="1.7"/>
    <rect x="640" y="208" width="360" height="7" rx="3.5" fill="#B07AA1"/>
    <text x="658" y="244" font-size="13" font-weight="850" fill="#B07AA1">Planning</text>
    <text class="" x="658" y="276" font-size="20" font-weight="850" fill="#172033" text-anchor="start"><tspan x="658" dy="0">Task &amp; Constraint</tspan><tspan x="658" dy="22.400000000000002">Planning</tspan></text>
    <text class="" x="658" y="308" font-size="13.2" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="658" dy="0">goal decomposition / affordance /</tspan><tspan x="658" dy="15.575999999999999">physical constraints</tspan></text>
  </g><g>
    <rect x="1368" y="290" width="336" height="132" rx="12" fill="#ffffff" stroke="#E15759" stroke-width="1.7"/>
    <rect x="1368" y="290" width="336" height="7" rx="3.5" fill="#E15759"/>
    <text x="1386" y="326" font-size="13" font-weight="850" fill="#E15759">VLA</text>
    <text class="" x="1386" y="358" font-size="20" font-weight="850" fill="#172033" text-anchor="start"><tspan x="1386" dy="0">Executable Action</tspan></text>
    <text class="" x="1386" y="390" font-size="13.2" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="1386" dy="0">action representation / policy /</tspan><tspan x="1386" dy="15.575999999999999">online tuning</tspan></text>
  </g><g>
    <rect x="1210" y="650" width="360" height="132" rx="12" fill="#ffffff" stroke="#59A14F" stroke-width="1.7"/>
    <rect x="1210" y="650" width="360" height="7" rx="3.5" fill="#59A14F"/>
    <text x="1228" y="686" font-size="13" font-weight="850" fill="#59A14F">WAM</text>
    <text class="" x="1228" y="718" font-size="20" font-weight="850" fill="#172033" text-anchor="start"><tspan x="1228" dy="0">World Prediction</tspan></text>
    <text class="" x="1228" y="750" font-size="13.2" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="1228" dy="0">future state / rollout /</tspan><tspan x="1228" dy="15.575999999999999">verification score</tspan></text>
  </g><g>
    <rect x="260" y="675" width="360" height="132" rx="12" fill="#ffffff" stroke="#76B7B2" stroke-width="1.7"/>
    <rect x="260" y="675" width="360" height="7" rx="3.5" fill="#76B7B2"/>
    <text x="278" y="711" font-size="13" font-weight="850" fill="#76B7B2">Monitor</text>
    <text class="" x="278" y="743" font-size="20" font-weight="850" fill="#172033" text-anchor="start"><tspan x="278" dy="0">Failure Feedback</tspan></text>
    <text class="" x="278" y="775" font-size="13.2" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="278" dy="0">failure detection / recovery /</tspan><tspan x="278" dy="15.575999999999999">experience update</tspan></text>
  </g><rect x="682" y="416" width="436" height="206" rx="18" fill="#ffffff" stroke="#172033" stroke-opacity="0.18" stroke-width="1.5"/>
    <text x="900" y="458" font-size="14" font-weight="850" fill="#5f6b7a" text-anchor="middle">Core question</text>
    <text class="" x="900" y="506" font-size="23.5" font-weight="850" fill="#172033" text-anchor="middle"><tspan x="900" dy="0">Can an embodied agent act, predict,</tspan><tspan x="900" dy="27.729999999999997">detect failure, and recover?</tspan></text>
    <text x="900" y="600" font-size="12.5" font-weight="760" fill="#5f6b7a" text-anchor="middle">act - predict - detect failure - recover</text><rect x="118" y="858" width="1564" height="2" fill="#edf1f5"/>
    <text x="82" y="900" font-size="14" font-weight="850" fill="#5f6b7a">Promising research questions</text><g>
    <rect x="82" y="920" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="82" y="920" width="7" height="124" rx="3.5" fill="#4E79A7"/>
    <text x="104" y="951" font-size="13" font-weight="850" fill="#4E79A7">VLN → Planning</text>
    <text class="" x="104" y="978" font-size="15.8" font-weight="850" fill="#172033" text-anchor="start"><tspan x="104" dy="0">How can spatial memory become a planning</tspan><tspan x="104" dy="18.012">substrate?</tspan></text>
    <text class="" x="104" y="1015" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="104" dy="0">semantic maps, 3D memory, trajectories → task graph</tspan><tspan x="104" dy="13.793999999999999">/ affordance map</tspan></text>
  </g><g>
    <rect x="630" y="920" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="630" y="920" width="7" height="124" rx="3.5" fill="#E15759"/>
    <text x="652" y="951" font-size="13" font-weight="850" fill="#E15759">Planning → VLA</text>
    <text class="" x="652" y="978" font-size="15.8" font-weight="850" fill="#172033" text-anchor="start"><tspan x="652" dy="0">How can high-level plans become executable</tspan><tspan x="652" dy="18.012">robot actions?</tspan></text>
    <text class="" x="652" y="1015" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="652" dy="0">subgoals, constraints, skills → action tokens /</tspan><tspan x="652" dy="13.793999999999999">waypoints / diffusion policy</tspan></text>
  </g><g>
    <rect x="1178" y="920" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="1178" y="920" width="7" height="124" rx="3.5" fill="#59A14F"/>
    <text x="1200" y="951" font-size="13" font-weight="850" fill="#59A14F">WAM → Planning/VLA</text>
    <text class="" x="1200" y="978" font-size="15.8" font-weight="850" fill="#172033" text-anchor="start"><tspan x="1200" dy="0">How can world models verify and rank</tspan><tspan x="1200" dy="18.012">embodied actions?</tspan></text>
    <text class="" x="1200" y="1015" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="1200" dy="0">action candidates → imagined rollout / uncertainty /</tspan><tspan x="1200" dy="13.793999999999999">action score</tspan></text>
  </g><g>
    <rect x="356" y="1050" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="356" y="1050" width="7" height="124" rx="3.5" fill="#B07AA1"/>
    <text x="378" y="1081" font-size="13" font-weight="850" fill="#B07AA1">VLA → Planning</text>
    <text class="" x="378" y="1108" font-size="15.8" font-weight="850" fill="#172033" text-anchor="start"><tspan x="378" dy="0">How can execution failures become reusable</tspan><tspan x="378" dy="18.012">planning feedback?</tspan></text>
    <text class="" x="378" y="1145" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="378" dy="0">failure traces, error explanations, recovery actions</tspan><tspan x="378" dy="13.793999999999999">→ memory update / replanning</tspan></text>
  </g><g>
    <rect x="904" y="1050" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="904" y="1050" width="7" height="124" rx="3.5" fill="#76B7B2"/>
    <text x="926" y="1081" font-size="13" font-weight="850" fill="#76B7B2">Deployment → All</text>
    <text class="" x="926" y="1108" font-size="15.8" font-weight="850" fill="#172033" text-anchor="start"><tspan x="926" dy="0">How can closed-loop agents be evaluated</tspan><tspan x="926" dy="18.012">under deployment constraints?</tspan></text>
    <text class="" x="926" y="1145" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="926" dy="0">latency, safety, sim2real, benchmarks → readiness</tspan><tspan x="926" dy="13.793999999999999">evidence</tspan></text>
  </g></svg>
