<svg width="1680" height="1040" viewBox="0 0 1680 1040" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">具身智能研究发展脉络图</title>
  <desc id="desc">按照 2024、2025、2026 时间层，展示具身智能从感知语言到机器人自主决策的发展脉络。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="18" markerHeight="18" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="18" markerHeight="18" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="18" markerHeight="18" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="18" markerHeight="18" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-teal" markerWidth="18" markerHeight="18" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: #05070b; }
      .year-line { stroke: #cbd5e1; stroke-width: 4; stroke-dasharray: 18 16; opacity: 0.78; }
      .axis { stroke: #2dd4bf; stroke-width: 5; opacity: 0.7; marker-end: url(#arrow-teal); }
      .year-box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .year-text { fill: #64748b; font-family: Hiragino Sans GB; font-size: 26px; font-weight: 800; }
      .root { fill: #111827; stroke: #38bdf8; stroke-width: 2; rx: 20; }
      .root-text { fill: #ffffff; font-family: Hiragino Sans GB; font-size: 34px; font-weight: 800; }
      .root-sub { fill: #cbd5e1; font-family: Hiragino Sans GB; font-size: 16px; font-weight: 600; }
      .branch { fill: none; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; opacity: 0.95; }
      .branch-label { font-family: Hiragino Sans GB; font-size: 27px; font-weight: 800; }
      .node { rx: 12; stroke-width: 2; }
      .node-title { fill: #f8fafc; font-family: Hiragino Sans GB; font-size: 16px; font-weight: 800; }
      .node-sub { fill: #dbeafe; font-family: Hiragino Sans GB; font-size: 12px; font-weight: 600; opacity: 0.95; }
      .caption { fill: #94a3b8; font-family: Hiragino Sans GB; font-size: 15px; font-weight: 600; }
    </style>
  </defs>

  <rect class="bg" width="1680" height="1040"/>
  <line class="axis" x1="58" y1="940" x2="58" y2="110"/>
  <line class="year-line" x1="120" y1="760" x2="1600" y2="760"/>
  <line class="year-line" x1="120" y1="520" x2="1600" y2="520"/>
  <line class="year-line" x1="120" y1="280" x2="1600" y2="280"/>
  <rect class="year-box" x="10" y="735" width="96" height="42"/>
  <text class="year-text" x="58" y="765" text-anchor="middle">2024</text>
  <rect class="year-box" x="10" y="495" width="96" height="42"/>
  <text class="year-text" x="58" y="525" text-anchor="middle">2025</text>
  <rect class="year-box" x="10" y="255" width="96" height="42"/>
  <text class="year-text" x="58" y="285" text-anchor="middle">2026</text>

  <path class="branch" stroke="#2563eb" marker-end="url(#arrow-blue)" d="M820 898 C700 810 520 795 360 704 C260 646 240 560 238 468 C236 360 250 240 260 135"/>
  <path class="branch" stroke="#7c3aed" marker-end="url(#arrow-purple)" d="M840 898 C790 798 670 780 610 678 C560 590 570 480 610 395 C670 270 718 230 742 135"/>
  <path class="branch" stroke="#059669" marker-end="url(#arrow-green)" d="M860 898 C930 805 1010 780 1055 670 C1090 584 1080 445 1048 350 C1024 280 1010 215 1018 135"/>
  <path class="branch" stroke="#ea580c" marker-end="url(#arrow-orange)" d="M880 898 C1030 820 1232 805 1300 690 C1368 575 1345 445 1332 342 C1320 252 1326 190 1350 135"/>
  <path class="branch" stroke="#0f766e" marker-end="url(#arrow-teal)" d="M900 898 C1120 800 1438 805 1505 675 C1570 548 1538 400 1535 300 C1533 225 1548 178 1570 135"/>

  <text class="branch-label" x="210" y="868" fill="#60a5fa">VLN</text>
  <text class="branch-label" x="510" y="868" fill="#a78bfa">VLA / WAM</text>
  <text class="branch-label" x="1000" y="868" fill="#34d399">推理规划</text>
  <text class="branch-label" x="1220" y="868" fill="#fb923c">本体扩展</text>
  <text class="branch-label" x="1450" y="868" fill="#2dd4bf">部署评测</text>

  <g>
    <rect class="node" x="150" y="680" width="220" height="70" fill="#1d4ed8" stroke="#60a5fa"/>
    <text class="node-title" x="260" y="708" text-anchor="middle">从室内 VLN 出发</text>
    <text class="node-sub" x="260" y="730" text-anchor="middle">语言目标 + 路径跟随</text>
    <rect class="node" x="130" y="435" width="260" height="76" fill="#1d4ed8" stroke="#60a5fa"/>
    <text class="node-title" x="260" y="462" text-anchor="middle">地图记忆与开放场景</text>
    <text class="node-sub" x="260" y="484" text-anchor="middle">语义地图 + 城市导航</text>
    <rect class="node" x="130" y="188" width="260" height="78" fill="#1d4ed8" stroke="#60a5fa"/>
    <text class="node-title" x="260" y="216" text-anchor="middle">物理可执行导航</text>
    <text class="node-sub" x="260" y="238" text-anchor="middle">本体约束 + 端侧 agent</text>
  </g>

  <g>
    <rect class="node" x="460" y="680" width="270" height="70" fill="#6d28d9" stroke="#a78bfa"/>
    <text class="node-title" x="595" y="708" text-anchor="middle">通用 VLA 策略</text>
    <text class="node-sub" x="595" y="730" text-anchor="middle">动作 token + 机器人基础模型</text>
    <rect class="node" x="470" y="435" width="270" height="76" fill="#6d28d9" stroke="#a78bfa"/>
    <text class="node-title" x="605" y="462" text-anchor="middle">diffusion / flow 动作</text>
    <text class="node-sub" x="605" y="484" text-anchor="middle">3D grounding + 在线适应</text>
    <rect class="node" x="590" y="188" width="300" height="78" fill="#6d28d9" stroke="#a78bfa"/>
    <text class="node-title" x="740" y="216" text-anchor="middle">WAM 想象层</text>
    <text class="node-sub" x="740" y="238" text-anchor="middle">video / latent world model + VLA 验证</text>
  </g>

  <g>
    <rect class="node" x="900" y="680" width="250" height="70" fill="#047857" stroke="#34d399"/>
    <text class="node-title" x="1025" y="708" text-anchor="middle">任务分解</text>
    <text class="node-sub" x="1025" y="730" text-anchor="middle">语言到子目标和 code policy</text>
    <rect class="node" x="910" y="435" width="250" height="76" fill="#047857" stroke="#34d399"/>
    <text class="node-title" x="1035" y="462" text-anchor="middle">记忆与失败监控</text>
    <text class="node-sub" x="1035" y="484" text-anchor="middle">持久状态 + 恢复闭环</text>
    <rect class="node" x="900" y="188" width="270" height="78" fill="#047857" stroke="#34d399"/>
    <text class="node-title" x="1035" y="216" text-anchor="middle">自改进规划器</text>
    <text class="node-sub" x="1035" y="238" text-anchor="middle">经验修订 + 约束 grounding</text>
  </g>

  <g>
    <rect class="node" x="1160" y="680" width="230" height="70" fill="#c2410c" stroke="#fb923c"/>
    <text class="node-title" x="1275" y="708" text-anchor="middle">单臂到双臂</text>
    <text class="node-sub" x="1275" y="730" text-anchor="middle">协同控制和长程操作</text>
    <rect class="node" x="1160" y="435" width="230" height="76" fill="#c2410c" stroke="#fb923c"/>
    <text class="node-title" x="1275" y="462" text-anchor="middle">灵巧手系统</text>
    <text class="node-sub" x="1275" y="484" text-anchor="middle">高自由度抓取与操作</text>
    <rect class="node" x="1160" y="188" width="230" height="78" fill="#c2410c" stroke="#fb923c"/>
    <text class="node-title" x="1275" y="216" text-anchor="middle">人形与触觉</text>
    <text class="node-sub" x="1275" y="238" text-anchor="middle">全身控制 + 接触反馈</text>
  </g>

  <g>
    <rect class="node" x="1420" y="680" width="230" height="70" fill="#0f766e" stroke="#2dd4bf"/>
    <text class="node-title" x="1535" y="708" text-anchor="middle">benchmark 与数据集</text>
    <text class="node-sub" x="1535" y="730" text-anchor="middle">覆盖范围和可信评测</text>
    <rect class="node" x="1420" y="435" width="230" height="76" fill="#0f766e" stroke="#2dd4bf"/>
    <text class="node-title" x="1535" y="462" text-anchor="middle">效率与 sim2real</text>
    <text class="node-sub" x="1535" y="484" text-anchor="middle">压缩、缓存和迁移</text>
    <rect class="node" x="1420" y="188" width="230" height="78" fill="#0f766e" stroke="#2dd4bf"/>
    <text class="node-title" x="1535" y="216" text-anchor="middle">实时安全闭环</text>
    <text class="node-sub" x="1535" y="238" text-anchor="middle">低延迟、风险和对齐检查</text>
  </g>

  <rect class="root" x="680" y="898" width="320" height="82"/>
  <text class="root-text" x="840" y="936" text-anchor="middle">具身智能</text>
  <text class="root-sub" x="840" y="962" text-anchor="middle">从感知语言理解走向机器人自主决策</text>
  <text class="caption" x="840" y="1012" text-anchor="middle">脉络图：根据当前论文摘要、任务目标和方向表抽象为主题节点，不展示单篇论文。</text>
</svg>
