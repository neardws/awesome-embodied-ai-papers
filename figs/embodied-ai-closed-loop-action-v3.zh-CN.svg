    <text x="82" y="116" font-size="22" fill="#5f6b7a">研究主线：从空间记忆出发，经由规划、行动、世界预测和失败反馈，形成可恢复、可评测的具身智能体。</text>
    <text x="1718" y="82" font-size="24" font-weight="700" fill="#172033" text-anchor="end">707 篇论文  |  6 个方向  |  29 个子方向</text>
