    <text class="" x="278" y="775" font-size="13" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="278" dy="0">失败检测 / 恢复 / 经验更新</tspan></text>
  </g><rect x="682" y="416" width="436" height="206" rx="18" fill="#ffffff" stroke="#172033" stroke-opacity="0.18" stroke-width="1.5"/>
    <text x="900" y="458" font-size="14" font-weight="850" fill="#5f6b7a" text-anchor="middle">核心问题</text>
    <text class="" x="900" y="506" font-size="26" font-weight="850" fill="#172033" text-anchor="middle"><tspan x="900" dy="0">具身智能体能否行动、预测、发现失</tspan><tspan x="900" dy="30.68">败并恢复？</tspan></text>
    <text x="900" y="600" font-size="13" font-weight="760" fill="#5f6b7a" text-anchor="middle">行动 - 预测 - 失败检测 - 恢复</text><rect x="118" y="858" width="1564" height="2" fill="#edf1f5"/>
    <text x="82" y="900" font-size="14" font-weight="850" fill="#5f6b7a">值得继续做的研究点</text><g>
    <rect x="82" y="920" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="82" y="920" width="7" height="124" rx="3.5" fill="#4E79A7"/>
    <text x="104" y="951" font-size="13" font-weight="850" fill="#4E79A7">VLN → Planning</text>
    <text class="" x="104" y="978" font-size="16.4" font-weight="850" fill="#172033" text-anchor="start"><tspan x="104" dy="0">空间记忆如何成为规划底座？</tspan></text>
    <text class="" x="104" y="1015" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="104" dy="0">语义地图、3D memory、历史轨迹 → task</tspan><tspan x="104" dy="13.793999999999999">graph / affordance map</tspan></text>
  </g><g>
    <rect x="630" y="920" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="630" y="920" width="7" height="124" rx="3.5" fill="#E15759"/>
    <text x="652" y="951" font-size="13" font-weight="850" fill="#E15759">Planning → VLA</text>
    <text class="" x="652" y="978" font-size="16.4" font-weight="850" fill="#172033" text-anchor="start"><tspan x="652" dy="0">高层计划如何落地成机器人可执行动作？</tspan></text>
    <text class="" x="652" y="1015" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="652" dy="0">子目标、约束、技能 → action token /</tspan><tspan x="652" dy="13.793999999999999">waypoint / diffusion policy</tspan></text>
  </g><g>
    <rect x="1178" y="920" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="1178" y="920" width="7" height="124" rx="3.5" fill="#59A14F"/>
    <text x="1200" y="951" font-size="13" font-weight="850" fill="#59A14F">WAM → Planning/VLA</text>
    <text class="" x="1200" y="978" font-size="16.4" font-weight="850" fill="#172033" text-anchor="start"><tspan x="1200" dy="0">世界模型如何验证和排序具身动作？</tspan></text>
    <text class="" x="1200" y="1015" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="1200" dy="0">候选动作 → imagined rollout /</tspan><tspan x="1200" dy="13.793999999999999">uncertainty / action score</tspan></text>
  </g><g>
    <rect x="356" y="1050" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="356" y="1050" width="7" height="124" rx="3.5" fill="#B07AA1"/>
    <text x="378" y="1081" font-size="13" font-weight="850" fill="#B07AA1">VLA → Planning</text>
    <text class="" x="378" y="1108" font-size="16.4" font-weight="850" fill="#172033" text-anchor="start"><tspan x="378" dy="0">执行失败如何变成可复用的规划反馈？</tspan></text>
    <text class="" x="378" y="1145" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="378" dy="0">失败轨迹、错误解释、恢复动作 → memory</tspan><tspan x="378" dy="13.793999999999999">update / replanning</tspan></text>
  </g><g>
    <rect x="904" y="1050" width="500" height="124" rx="10" fill="#ffffff" stroke="#d9e1ea" stroke-width="1.3"/>
    <rect x="904" y="1050" width="7" height="124" rx="3.5" fill="#76B7B2"/>
    <text x="926" y="1081" font-size="13" font-weight="850" fill="#76B7B2">Deployment → 全部</text>
    <text class="" x="926" y="1108" font-size="16.4" font-weight="850" fill="#172033" text-anchor="start"><tspan x="926" dy="0">闭环智能体如何在真实部署约束下评测？</tspan></text>
    <text class="" x="926" y="1145" font-size="12.1" font-weight="400" fill="#5f6b7a" text-anchor="start"><tspan x="926" dy="0">延迟、安全、sim2real、benchmark →</tspan><tspan x="926" dy="13.793999999999999">readiness evidence</tspan></text>
  </g></svg>
